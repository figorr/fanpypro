substitutions:
  device_name: gateway-pasillo
  friendly_name: "Gateway Pasillo"
  rf_frequency: "433.92MHz"
  static_ip: "192.168.2.152"
  gateway_ip: "192.168.2.1"
  subnet_mask: "255.255.255.0"
  dns1_ip: "192.168.2.1"
  dns2_ip: "8.8.8.8"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  on_boot:
    priority: 0
    then:
      - logger.log: "Iniciando CC1101 en modo RX..."
      - cc1101.begin_rx
      - logger.log: "CC1101 en modo RX - esperando señales"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret gateway_api_encryption_key
  services:
    - service: transmit_raw
      variables:
        raw_code: int[]
        repeat_times: int
        wait_time_ms: int
      then:
        - remote_transmitter.transmit_raw:
            code: !lambda return raw_code;
            repeat:
              times: !lambda return repeat_times;
              wait_time: !lambda return wait_time_ms;

    - service: transmit_rc_switch
      variables:
        code: string
        repeat_times: int
      then:
        - logger.log:
            format: "Transmit RCSwitch: code=%s repeat=%d"
            args: [code, repeat_times]
        - remote_transmitter.transmit_rc_switch_raw:
            code: !lambda return code;
            protocol: 1
            repeat:
              times: !lambda return repeat_times;
              wait_time: 0s

ota:
  - platform: esphome
    password: !secret gateway_ota_password

captive_portal:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: ${static_ip}
    gateway: ${gateway_ip}
    subnet: ${subnet_mask}
    dns1: ${dns1_ip}
    dns2: ${dns2_ip}
  ap:
    ssid: "${device_name}-fallback"
    password: "fanpypro123"

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO23
  miso_pin: GPIO19
  interface: hardware

cc1101:
  cs_pin: GPIO32
  frequency: ${rf_frequency}
  output_power: 11

remote_receiver:
  pin: GPIO25
  dump:
    - raw
    - rc_switch
  tolerance: 50%
  idle: 10ms
  buffer_size: 10kb
  rmt_symbols: 96
  on_rc_switch:
    then:
      - homeassistant.event:
          event: esphome.fanpypro_rf_code
          data:
            device: ${device_name}
            code: !lambda return x.code;
            protocol: "1"

remote_transmitter:
  pin: GPIO26
  carrier_duty_percent: 100%
  rmt_symbols: 256
  non_blocking: true
  on_transmit:
    then:
      - cc1101.begin_tx
  on_complete:
    then:
      - cc1101.begin_rx

